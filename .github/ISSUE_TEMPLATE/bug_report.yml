name: Bug report
description: Report a reproducible problem in the application
title: "[Bug]: "
labels: []
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve India Map Studio. Do not include private data.
  - type: input
    id: page
    attributes:
      label: Page or feature
      description: Which page, map level, importer, or export is affected?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence that demonstrates the problem.
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      placeholder: Firefox 130 on Windows 11
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, console errors, or a minimal non-sensitive sample file.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for an existing issue.
          required: true
        - label: I removed private or sensitive information.
          required: true
