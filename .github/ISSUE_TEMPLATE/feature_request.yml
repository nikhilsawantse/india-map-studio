name: Feature request
description: Suggest a focused improvement or new capability
title: "[Feature]: "
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the interaction or API you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      options:
        - Map viewers
        - Map authors
        - Data contributors
        - Developers embedding the map
        - Accessibility users
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for an existing request.
          required: true
